{{- if and .Values.gateway.managementToken (not .Values.gateway.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argus-mcp.fullname" . }}-secrets
  labels:
    {{- include "argus-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  management-token: {{ .Values.gateway.managementToken | b64enc | quote }}
{{- end }}
