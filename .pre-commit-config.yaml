# Pre-commit hooks — run before each commit
# Install:
#   pip install pre-commit
#   pre-commit install
#   pre-commit install --hook-type pre-push
# Docs: https://pre-commit.com

repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^charts/.*/templates/'
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: '^uv\.lock$'
      - id: detect-private-key
      - id: check-merge-conflict

  # Ruff — lint + format (replaces flake8 + isort + black for linting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Typos — catch common misspellings
  - repo: https://github.com/crate-ci/typos
    rev: v1.33.1
    hooks:
      - id: typos
        args: ['--config', '.typos.toml']

  # Local hooks (pytest on pre-push — tests/ is local-only)
  - repo: local
    hooks:
      - id: pytest
        name: pytest (pre-push)
        entry: python -m pytest tests/ -m "not live_server and not integration and not semgrep" --cov=argus_mcp --cov-report=term-missing --timeout=60 -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
