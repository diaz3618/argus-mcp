# Hadolint configuration for argus-mcp
# Docs: https://github.com/hadolint/hadolint#configure
---
failure-threshold: warning

ignored:
  # DL3008: Pin versions in apt-get install — we use --no-install-recommends
  # and runtime packages float to get security patches from base image updates
  - DL3008

  # DL3013: Pin pip package versions — pip itself is pinned (line 126),
  # maturin is build-stage only (discarded), uv is COPY'd from pinned image
  - DL3013

  # DL3059: Multiple consecutive RUN — we deliberately separate RUN layers
  # for cache efficiency in multi-stage build
  - DL3059

  # DL3002: Last USER should not be root — false positive for multi-stage builds.
  # Builder stages (rust-builder, go-builder, builder) need root for package
  # installs; the runtime stage correctly ends with USER 65532 (nonroot).
  - DL3002

  # DL3007: Using latest is prone to errors — Chainguard images use :latest
  # and :latest-dev tags as their stable release channel (no semver tags).
  # Pinning is done via image digest in production deployments.
  - DL3007

  # DL3018: Pin versions in apk add — same rationale as DL3008 for apt-get.
  # Chainguard builder stage packages float to get security patches;
  # the builder stage is discarded and does not affect the runtime image.
  - DL3018
