name: Publish to PyPI

on:
  release:
    types: [published]

  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: argus-mcp
            path: .
            rust: true
          - name: argus-cli
            path: packages/argus_cli
            rust: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Install Rust toolchain
        if: matrix.package.rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        if: matrix.package.rust
        run: pip install maturin

      - name: Build Rust extensions
        if: matrix.package.rust
        run: |
          pip install -e .
          python scripts/build_rust.py

      - name: Build distribution packages
        run: python -m build ${{ matrix.package.path }}

      - name: Verify distribution packages
        run: |
          pip install twine
          twine check ${{ matrix.package.path }}/dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-${{ matrix.package.name }}
          path: ${{ matrix.package.path }}/dist/

  publish-to-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]

    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/argus-mcp

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4.1.8
        with:
          pattern: release-dists-*
          merge-multiple: true
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          skip-existing: true

  # ──────────────────────────────────────────────
  # argusd — cross-compile and upload Go binaries
  # ──────────────────────────────────────────────
  build-argusd:
    name: Build argusd binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/argusd/go.mod
          cache-dependency-path: packages/argusd/go.sum

      - name: Cross-compile argusd
        run: make -C packages/argusd build-all

      - name: Upload argusd binaries
        uses: actions/upload-artifact@v4
        with:
          name: argusd-binaries
          path: packages/argusd/dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true  # TestPyPI is best-effort; don't fail the workflow

    permissions:
      id-token: write

    environment:
      name: testpypi
      url: https://test.pypi.org/p/argus-mcp

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4.1.8
        with:
          pattern: release-dists-*
          merge-multiple: true
          path: dist/

      - name: Publish release distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
