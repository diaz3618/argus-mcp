# =============================================================================
# Publish to PyPI — Delegated to build-wheels.yml
# =============================================================================
# argus-mcp platform wheels (Rust + Go) are built by build-wheels.yml.
# This workflow handles only the argusd standalone binary cross-compilation
# which is uploaded as a release asset (not published to PyPI).
# =============================================================================

name: Publish to PyPI

on:
  release:
    types: [published]

  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:

  # Trigger the main build-wheels workflow for platform wheels + PyPI publish
  trigger-wheel-build:
    name: Trigger wheel build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dispatch build-wheels workflow
        run: gh workflow run build-wheels.yml --ref "${{ github.ref }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # argusd — cross-compile and upload Go binaries
  # ──────────────────────────────────────────────
  build-argusd:
    name: Build argusd binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/argusd/go.mod
          cache-dependency-path: packages/argusd/go.sum

      - name: Cross-compile argusd
        run: make -C packages/argusd build-all

      - name: Upload argusd binaries
        uses: actions/upload-artifact@v7
        with:
          name: argusd-binaries
          path: packages/argusd/dist/
