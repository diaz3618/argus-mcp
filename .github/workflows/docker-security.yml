# =============================================================================
# Docker Security — Container image supply-chain hardening
# =============================================================================
#
# Pipeline: Hadolint (Dockerfile lint) → Build → Dockle (CIS best practices)
#           → Syft (SBOM generation) → Trivy (vulnerability scan)
#
# Runs on:
#   - Push to main (path-filtered to Dockerfile changes)
#   - Pull requests touching Dockerfile or docker-related files
#   - Manual dispatch
#
# NOTE: The ci.yml container-scan job covers PR/push Trivy image scans.
#       This workflow adds deeper supply-chain analysis: Hadolint, Dockle,
#       Syft SBOM, and optionally Grype.
#
# Both standard (Dockerfile) and DHI (Dockerfile.dhi) variants are scanned
# via matrix strategy. Each variant gets distinct artifact names to avoid
# collision in parallel execution.
# =============================================================================

name: Docker Security

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'Dockerfile.dhi'
      - '.dockerignore'
      - '.hadolint.yaml'
      - 'pyproject.toml'
      - '.github/workflows/docker-security.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'Dockerfile.dhi'
      - '.dockerignore'
      - '.hadolint.yaml'
      - 'pyproject.toml'
      - '.github/workflows/docker-security.yml'
  workflow_dispatch:

concurrency:
  group: docker-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Hadolint — Dockerfile best-practices linter
  # ──────────────────────────────────────────────
  hadolint:
    name: Hadolint (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile: [Dockerfile, Dockerfile.dhi]
    steps:
      - uses: actions/checkout@v6

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  # ──────────────────────────────────────────────
  # Build — required for Dockle, Syft, Trivy
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.dockerfile }})
    needs: [hadolint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile: [Dockerfile, Dockerfile.dhi]
        include:
          - dockerfile: Dockerfile
            image-tag: argus-mcp:security-check
            artifact-name: docker-image
          - dockerfile: Dockerfile.dhi
            image-tag: argus-mcp:security-check-dhi
            artifact-name: docker-image-dhi
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tarball
        run: docker save ${{ matrix.image-tag }} -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: /tmp/image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Dockle — CIS Docker Benchmark checks
  # ──────────────────────────────────────────────
  dockle:
    name: Dockle (${{ matrix.variant }})
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            image-tag: argus-mcp:security-check
            artifact-name: docker-image
          - variant: dhi
            image-tag: argus-mcp:security-check-dhi
            artifact-name: docker-image-dhi
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact-name }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Run Dockle
        uses: erzz/dockle-action@v1
        env:
          # DKL-DI-0005: base image python:3.13-slim uses apt-get dist-clean
          # instead of rm -rf /var/lib/apt/lists — unfixable upstream
          DOCKLE_IGNORES: DKL-DI-0005
        with:
          image: ${{ matrix.image-tag }}
          failure-threshold: WARN
          accept-keywords: GPG_KEY
          accept-filenames: settings.py
          exit-code: 1

  # ──────────────────────────────────────────────
  # Syft — SBOM generation (SPDX + CycloneDX)
  # ──────────────────────────────────────────────
  sbom:
    name: Syft SBOM (${{ matrix.variant }})
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            image-tag: argus-mcp:security-check
            artifact-name: docker-image
          - variant: dhi
            image-tag: argus-mcp:security-check-dhi
            artifact-name: docker-image-dhi
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact-name }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image-tag }}
          format: spdx-json
          output-file: sbom-spdx.json

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image-tag }}
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: sbom-reports-${{ matrix.variant }}
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # Trivy — deep image vulnerability scan
  # ──────────────────────────────────────────────
  trivy:
    name: Trivy (${{ matrix.variant }})
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            image-tag: argus-mcp:security-check
            artifact-name: docker-image
          - variant: dhi
            image-tag: argus-mcp:security-check-dhi
            artifact-name: docker-image-dhi
    steps:
      - uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact-name }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Run Trivy vulnerability + secret scanner (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ matrix.image-tag }}
          scanners: vuln,secret
          format: sarif
          output: trivy-results-${{ matrix.variant }}.sarif
          severity: CRITICAL,HIGH

      - name: Run Trivy CI gate (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ matrix.image-tag }}
          scanners: vuln,secret
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy SARIF results
        if: always() && hashFiles(format('trivy-results-{0}.sarif', matrix.variant)) != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-${{ matrix.variant }}.sarif
          category: docker-security-trivy-${{ matrix.variant }}

  # ──────────────────────────────────────────────
  # Gate — all security checks must pass
  # ──────────────────────────────────────────────
  docker-security-passed:
    name: Docker Security Passed
    if: always()
    needs:
      - hadolint
      - dockle
      - sbom
      - trivy
    runs-on: ubuntu-latest
    steps:
      - name: Verify all security checks passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
