# Trivy — Scheduled container vulnerability scan
# Runs weekly against the latest published image.
# On-PR/push scans are handled by ci.yml's container-scan job.

name: Trivy (scheduled)

on:
  schedule:
    - cron: '16 17 * * 2'   # Tuesday 17:16 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  container-scan:
    name: Trivy image scan (latest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Build image from Dockerfile
        run: docker build -t diaz3618/argus-mcp:trivy-scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: diaz3618/argus-mcp:trivy-scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-scheduled
