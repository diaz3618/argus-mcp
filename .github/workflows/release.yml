name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'  # Matches v1.0.0, v2.1.3, etc.

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  statuses: read

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Verify CI passed on this commit before releasing
      # Uses polling since CI may still be running when the tag is pushed
      - name: Verify CI status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA=$(git rev-list -n 1 "${GITHUB_REF#refs/tags/}")
          echo "Checking CI status for commit ${COMMIT_SHA}"
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=30
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(gh api \
              "repos/${{ github.repository }}/commits/${COMMIT_SHA}/status" \
              --jq '.state')
            echo "Attempt ${i}/${MAX_ATTEMPTS}: status=${STATUS}"
            if [ "${STATUS}" = "success" ]; then
              echo "CI passed."
              exit 0
            elif [ "${STATUS}" = "failure" ] || [ "${STATUS}" = "error" ]; then
              echo "::error::CI failed on this commit (status: ${STATUS}). Aborting release."
              exit 1
            fi
            echo "Waiting ${SLEEP_SECONDS}s for CI to complete..."
            sleep $SLEEP_SECONDS
          done
          echo "::error::CI did not complete within $((MAX_ATTEMPTS * SLEEP_SECONDS))s (status: ${STATUS}). Aborting release."
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distribution packages
        run: python -m build

      - name: Generate release notes
        id: release_notes
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Get previous tag for changelog
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "${GITHUB_REF#refs/tags/}" | tail -n1)

          # Generate changelog
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "## What's Changed" > release_notes.md
            echo "" >> release_notes.md
            git log ${PREVIOUS_TAG}..${GITHUB_REF#refs/tags/} --pretty=format:"- %s (%an)" --no-merges >> release_notes.md
          else
            echo "## Initial Release" > release_notes.md
            echo "" >> release_notes.md
            echo "First release of Argus MCP v$VERSION" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "pip install argus-mcp==$VERSION" >> release_notes.md
          echo "\`\`\`" >> release_notes.md

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          bodyFile: "release_notes.md"
          generateReleaseNotes: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # GITHUB_TOKEN releases do not trigger other workflows (anti-loop).
      # Explicitly dispatch publish.yml so PyPI publishing is automatic.
      - name: Trigger PyPI publish
        run: gh workflow run publish.yml --ref "${{ github.ref }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
