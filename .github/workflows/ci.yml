# CI workflow — Lint, Format, Type Check, Security
# Tiered: Tier 1 (fast) gates Tier 2 (expensive).
# NOTE: tests/ is local-only — pytest runs via pre-push git hook.
# Modeled after fastapi/fastapi and pydantic/pydantic CI patterns.
# Uses astral-sh/setup-uv for fast dependency resolution and caching.

name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'argus_mcp/**'
      - 'packages/**'
      - 'mods/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'argus_mcp/**'
      - 'packages/**'
      - 'mods/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: "1"
  UV_FROZEN: "true"

jobs:
  # ══════════════════════════════════════════════
  # Tier 1 — Fast checks (< 2 min each)
  # ══════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # Ruff — fast Python linter
  # ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff check
        run: uv run ruff check argus_mcp/

      - name: Run ruff check (argus_cli)
        run: uv run ruff check packages/argus_cli/argus_cli/

      - name: Run ruff check (mods/)
        run: uv run ruff check mods/

  # ──────────────────────────────────────────────
  # Ruff — code formatting verification
  # ──────────────────────────────────────────────
  format:
    name: Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff format --check
        run: uv run ruff format --check argus_mcp/ packages/argus_cli/argus_cli/ mods/

  # ──────────────────────────────────────────────
  # Mypy — static type checking
  # ──────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run mypy
        run: uv run mypy

  # ──────────────────────────────────────────────
  # Import boundary enforcement
  # ──────────────────────────────────────────────
  import-boundaries:
    name: Import Boundaries (import-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run lint-imports
        run: uv run lint-imports

  # NOTE: tests/ is local-only (excluded from remote). Test suite runs
  # via pre-push git hook instead — see .pre-commit-config.yaml.

  # ──────────────────────────────────────────────
  # Rust — build PyO3 extensions
  # ──────────────────────────────────────────────
  rust-extensions:
    name: Rust Extensions (maturin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            **/target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install project + maturin
        run: |
          uv sync --group dev
          uv pip install maturin

      - name: Build all Rust extensions
        run: uv run python scripts/build_rust.py

  # ──────────────────────────────────────────────
  # Go — build argusd daemon
  # ──────────────────────────────────────────────
  go-daemon:
    name: Go Daemon (argusd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/argusd/go.mod
          cache-dependency-path: packages/argusd/go.sum

      - name: Build argusd
        run: make -C packages/argusd build

      - name: Run Go vet
        run: make -C packages/argusd vet

      - name: Run Go tests
        run: make -C packages/argusd test

  # ──────────────────────────────────────────────
  # Security — filesystem scan
  # ──────────────────────────────────────────────
  security-scan:
    name: Security scan (Trivy FS)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-fs-results.sarif

  # ══════════════════════════════════════════════
  # Tier 2 — Expensive checks (gated on Tier 1)
  # ══════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # Container scan — build + Trivy image scan
  # ──────────────────────────────────────────────
  container-scan:
    name: Container scan (Trivy image)
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t diaz3618/argus-mcp:ci-test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: diaz3618/argus-mcp:ci-test
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-image-results.sarif
          category: container-scan

  # ──────────────────────────────────────────────
  # Gate — single check for branch protection
  # ──────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    if: always()
    needs:
      - lint
      - format
      - typecheck
      - import-boundaries
      - rust-extensions
      - go-daemon
      - security-scan
      - container-scan
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
