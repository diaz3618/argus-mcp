# CI workflow — Lint, Format, Type Check, Tests, Security
# Tiered: Tier 1 (fast) gates Tier 2 (expensive).
# Modeled after fastapi/fastapi and pydantic/pydantic CI patterns.
# Uses astral-sh/setup-uv for fast dependency resolution and caching.

name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_COLOR: "1"
  UV_FROZEN: "true"

jobs:
  # ══════════════════════════════════════════════
  # Tier 1 — Fast checks (< 2 min each)
  # ══════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # Ruff — fast Python linter
  # ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff check
        run: uv run ruff check argus_mcp/

      - name: Run ruff check (mods/)
        run: uv run ruff check mods/

  # ──────────────────────────────────────────────
  # Black — code formatting verification
  # ──────────────────────────────────────────────
  format:
    name: Format (black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run black --check
        run: uv run black --check argus_mcp/ mods/

  # ──────────────────────────────────────────────
  # Mypy — static type checking
  # ──────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run mypy
        run: uv run mypy

  # ──────────────────────────────────────────────
  # Unit tests with coverage
  # ──────────────────────────────────────────────
  unit-tests:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev --group test

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            -m "not live_server" \
            --cov=argus_mcp \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --timeout=60 \
            -q

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  # Security — filesystem scan
  # ──────────────────────────────────────────────
  security-scan:
    name: Security scan (Trivy FS)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

  # ══════════════════════════════════════════════
  # Tier 2 — Expensive checks (gated on Tier 1)
  # ══════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # Container scan — build + Trivy image scan
  # ──────────────────────────────────────────────
  container-scan:
    name: Container scan (Trivy image)
    needs: [lint, unit-tests]
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t diaz3618/argus-mcp:ci-test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: diaz3618/argus-mcp:ci-test
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: container-scan

  # ──────────────────────────────────────────────
  # Gate — single check for branch protection
  # ──────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    if: always()
    needs:
      - lint
      - format
      - typecheck
      - unit-tests
      - security-scan
      - container-scan
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
